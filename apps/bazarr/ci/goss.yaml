## https://github.com/aelsabbahy/goss/blob/master/docs/manual.md#user
user:
  appnest:
    exists: true
    uid: 568
    gid: 568

## https://github.com/aelsabbahy/goss/blob/master/docs/manual.md#file
file:
  /app/bazarr/bazarr.py:
    exists: true
  /config:
    exists: true
    owner: appnest
    group: appnest

## https://github.com/aelsabbahy/goss/blob/master/docs/manual.md#process
process:
  python3:
    running: true

## https://github.com/aelsabbahy/goss/blob/master/docs/manual.md#port
## Bazarr's / endpoint returns 500 until the customer completes the
## first-run wizard - the port being up is the strongest health signal
## we can give from a fresh image with no persisted state.
port:
  tcp:6767:
    listening: true
