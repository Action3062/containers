# Restricted tmux config for the customer-facing web shell.
#
# Goal: tmux gives the customer a persistent session and scrollback, but it
# does NOT become a tool to spawn arbitrary background processes that
# survive ttyd disconnects in ways the operator cannot see.

# No prefix-driven shell-out: disable the command prompt and new-window/split
# bindings so the user cannot launch arbitrary commands inside the same pane
# tree. They still get a working shell in the initial pane.
set -g prefix C-b
unbind-key :
unbind-key c
unbind-key '"'
unbind-key %
unbind-key &
unbind-key x

# Reasonable defaults for a web terminal.
set -g default-terminal "xterm-256color"
set -g history-limit 10000
set -g mouse on
set -g status-left  "#[fg=green]openclaw"
set -g status-right "#[fg=yellow]%Y-%m-%d %H:%M"

# Detaching is fine; killing the server isn't.
unbind-key C-x
bind-key d detach-client

# Lock the session shell to fish.
set -g default-shell /usr/bin/fish
